# AMPNet-Mamba without Deep Supervision (G+M, no D)
# Based on ablation finding: deep supervision has negative marginal effect (-0.022)

data:
  dataset_root: "/workspace/P1-MAR/data"
  images_dir: "images"
  lesion_labels_dir: "labels/csPCa_lesion_delineations/human_expert/merged"
  gland_labels_dir: "labels/anatomical_delineations/whole_gland/AI/Bosma22b"
  clinical_info: "labels/clinical_information/marksheet.csv"
  modalities: ["t2w", "hbv", "adc"]
  target_spacing: [0.5, 0.5, 3.0]
  crop_size: [128, 128, 32]
  patch_crop_size: [64, 64, 16]
  foreground_crop_prob: 0.75
  split_source: "picai_pub"
  fold: 0
  num_workers: 8
  seed: 42

preprocessing:
  t2w_norm: "zscore"
  hbv_norm: "zscore"
  adc_norm: "minmax"
  adc_clip_range: [0, 3000]

augmentation:
  modality_dropout_prob: 0.3
  gaussian_noise_std: 0.1
  motion_artifact_prob: 0.15
  random_flip: true
  random_rotation_range: 15

model:
  name: "AdaptiveMPNet"
  in_channels: 1
  num_modalities: 3
  base_features: 48
  nnunet_base_features: 32
  num_stages: 4
  patch_size: [4, 4, 2]
  ssm_d_state: 16
  ssm_d_conv: 4
  ssm_expand: 2
  dropout: 0.1
  num_classes: 2

training:
  batch_size: 8
  num_epochs: 300
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.01
  scheduler: "reduce_on_plateau"
  warmup_epochs: 10
  min_lr: 0.000001
  plateau_patience: 10
  plateau_factor: 0.5
  early_stopping_patience: 0
  loss: "dice_focal"
  dice_weight: 1.0
  focal_weight: 1.0
  focal_alpha: 0.9
  focal_gamma: 2.0
  tversky_weight: 0.0
  tversky_alpha: 0.3
  tversky_beta: 0.7
  deep_supervision: false
  oversample_positive_factor: 5
  gradient_clip: 1.0
  mixed_precision: true
  ddp: true
  num_gpus: 4
  checkpoint_dir: "/workspace/P1-MAR/outputs/checkpoints"
  log_dir: "/workspace/P1-MAR/outputs/logs"

evaluation:
  metrics: ["dice", "sensitivity", "specificity"]
  test_scenarios:
    - name: "ideal"
      drop_modalities: []
    - name: "missing_t2w"
      drop_modalities: ["t2w"]
    - name: "missing_hbv"
      drop_modalities: ["hbv"]
    - name: "missing_adc"
      drop_modalities: ["adc"]
    - name: "artifact_t2w"
      artifact_modalities: ["t2w"]
      artifact_noise_std: 0.5
    - name: "artifact_hbv"
      artifact_modalities: ["hbv"]
      artifact_noise_std: 0.5
    - name: "artifact_adc"
      artifact_modalities: ["adc"]
      artifact_noise_std: 0.5
